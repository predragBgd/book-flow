# Render Blueprint — BookFlow backend + PostgreSQL
# After sync: open Shell on bookflow-backend and run: python init_production.py

services:
  - type: web
    name: bookflow-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 run:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: bookflow-db
          property: connectionString

databases:
  - name: bookflow-db
    plan: free
